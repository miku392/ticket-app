<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
}
button {
  font-size: 18px;
  padding: 10px 20px;
  margin-top: 15px;
}
</style>

</head>

<body>

<h2>チケット管理</h2>

<div id="status">読み込み中...</div>
<div id="result"></div>

<script>
const LIFF_ID = "2009952908-8E8DGhNq";
const GAS_URL = "https://script.google.com/macros/s/AKfycbwpweTlLFzuw5a4RHGFPsHj-I9B2lFc7KPfh12R35MHH8X6Ol2lmHoDIvcCar9ql0Fb/exec";

let userId = "";

async function start() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

document.getElementById("status").innerText = "userId取得OK / GAS通信開始";

loadTicket();

  } catch (e) {
    document.getElementById("status").innerText = "エラー：" + e;
  }
}

function loadTicket() {
  const url = GAS_URL + "?action=getMyTicket&userId=" + userId + "&callback=cb";

  window.cb = function(data) {
    if (!data.registered) {
      document.getElementById("result").innerText =
        "未登録です\nuserIdをシートに入れてください\n" + userId;
      return;
    }

    document.getElementById("result").innerHTML =
      "<h3>" + data.name + "</h3>" +
      "残り：" + data.tickets +
      "<br><button onclick='useTicket()'>使用する</button>";
  };

  const script = document.createElement("script");
  script.src = url;
  document.body.appendChild(script);
}

function useTicket() {
  const url = GAS_URL + "?action=useTicket&userId=" + userId + "&callback=cb2";

  window.cb2 = function(data) {
    document.getElementById("result").innerHTML =
      "<h3>" + data.name + "</h3>" +
      data.before + " → " + data.after +
      "<br>使用済<br>" +
      "<button onclick='loadTicket()'>戻る</button>";
  };

  const script = document.createElement("script");
  script.src = url;
  document.body.appendChild(script);
}

start();
</script>

</body>
</html>
